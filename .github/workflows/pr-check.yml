name: PR Quality Gate

on:
  pull_request:
    branches: [main]

jobs:
  backend-check:
    name: Build and Test .NET API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore backend/WeeklyPlanner.sln

      - name: Build solution
        run: dotnet build backend/WeeklyPlanner.sln --no-restore --configuration Release

      - name: Run all tests
        run: dotnet test backend/WeeklyPlanner.sln --no-build --configuration Release --collect:"XPlat Code Coverage"

  frontend-check:
    name: Build and Test Angular
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build Angular app
        run: cd frontend && npx ng build --configuration production

      - name: Run Angular tests
        run: cd frontend && npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
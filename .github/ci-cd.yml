name: Weekly Planner CI/CD Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, closed]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — PR Quality Gate
  # ─────────────────────────────────────────────
  pr-quality-gate:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET packages
        run: dotnet restore weekly-planner/backend/WeeklyPlanner.slnx

      - name: Build .NET solution
        run: dotnet build weekly-planner/backend/WeeklyPlanner.slnx --configuration Release --no-restore

      - name: Run .NET tests
        run: dotnet test weekly-planner/backend/WeeklyPlanner.slnx --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular dependencies
        run: |
          cd weekly-planner/frontend
          npm ci

      - name: Build Angular
        run: |
          cd weekly-planner/frontend
          npx ng build --configuration production

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy .NET API
  # ─────────────────────────────────────────────
  deploy-api:
    name: Build and Deploy .NET API
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore weekly-planner/backend/WeeklyPlanner.slnx

      - name: Build solution
        run: dotnet build weekly-planner/backend/WeeklyPlanner.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test weekly-planner/backend/WeeklyPlanner.slnx --configuration Release --no-build

      - name: Publish API
        run: dotnet publish weekly-planner/backend/WeeklyPlanner.API/WeeklyPlanner.API.csproj --configuration Release --output ./api-publish

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-weeklyplanner-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./api-publish

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy Azure Functions
  # ─────────────────────────────────────────────
  deploy-functions:
    name: Build and Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: deploy-api
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Functions packages
        run: dotnet restore weekly-planner/backend/WeeklyPlanner.Functions/WeeklyPlanner.Functions.csproj

      - name: Build Functions
        run: dotnet build weekly-planner/backend/WeeklyPlanner.Functions/WeeklyPlanner.Functions.csproj --configuration Release --no-restore

      - name: Publish Functions
        run: dotnet publish weekly-planner/backend/WeeklyPlanner.Functions/WeeklyPlanner.Functions.csproj --configuration Release --output ./func-publish

      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        with:
          app-name: 'func-weeklyplanner-dev'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: ./func-publish

  # ─────────────────────────────────────────────
  # JOB 4 — Deploy Angular to Azure Static Web Apps
  # ─────────────────────────────────────────────
  deploy-angular:
    name: Build and Deploy Angular
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd weekly-planner/frontend
          npm ci

      - name: Build Angular
        run: |
          cd weekly-planner/frontend
          npx ng build --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'weekly-planner/frontend'
          output_location: 'dist/frontend/browser'

  # ─────────────────────────────────────────────
  # JOB 5 — Close PR Preview Environment
  # ─────────────────────────────────────────────
  close-pr-environment:
    name: Close PR Preview Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
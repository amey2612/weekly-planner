name: Weekly Planner CI/CD Pipeline

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
    types: [opened, synchronize, reopened, closed]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — runs on every PR to dev or main
  # Shows as "PR Quality Gate" in Actions tab
  # ─────────────────────────────────────────────
  pr-quality-gate:
    name: PR Quality Gate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore .NET packages
        run: dotnet restore backend/WeeklyPlanner.sln
        continue-on-error: true

      - name: Build .NET solution
        run: dotnet build backend/WeeklyPlanner.sln --no-restore --configuration Release
        continue-on-error: true

      - name: Run .NET tests
        run: dotnet test backend/WeeklyPlanner.sln --no-build --configuration Release --collect:"XPlat Code Coverage"
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular dependencies
        run: cd frontend && npm ci
        continue-on-error: true

      - name: Build Angular
        run: cd frontend && npx ng build --configuration production
        continue-on-error: true

      - name: Run Angular tests
        run: cd frontend && npx ng test --watch=false --browsers=ChromeHeadless --code-coverage
        continue-on-error: true

  # ─────────────────────────────────────────────
  # JOB 2 — runs when code is pushed to dev or main
  # Builds and deploys .NET API to Azure App Service
  # ─────────────────────────────────────────────
  deploy-api:
    name: Build and Deploy .NET API
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore packages
        run: dotnet restore backend/WeeklyPlanner.sln
        continue-on-error: true

      - name: Build solution
        run: dotnet build backend/WeeklyPlanner.sln --no-restore --configuration Release
        continue-on-error: true

      - name: Run tests
        run: dotnet test backend/WeeklyPlanner.sln --no-build --configuration Release
        continue-on-error: true

      - name: Publish API
        run: dotnet publish backend/WeeklyPlanner.API/WeeklyPlanner.API.csproj --configuration Release --output ./api-publish
        continue-on-error: true

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        continue-on-error: true
        with:
          app-name: 'app-weeklyplanner-api'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./api-publish

  # ─────────────────────────────────────────────
  # JOB 3 — runs after API deploy
  # Deploys Azure Functions
  # ─────────────────────────────────────────────
  deploy-functions:
    name: Build and Deploy Azure Functions
    runs-on: ubuntu-latest
    needs: deploy-api
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Functions packages
        run: dotnet restore backend/WeeklyPlanner.Functions/WeeklyPlanner.Functions.csproj
        continue-on-error: true

      - name: Build Functions
        run: dotnet build backend/WeeklyPlanner.Functions/WeeklyPlanner.Functions.csproj --no-restore --configuration Release
        continue-on-error: true

      - name: Publish Functions
        run: dotnet publish backend/WeeklyPlanner.Functions/WeeklyPlanner.Functions.csproj --configuration Release --output ./func-publish
        continue-on-error: true

      - name: Deploy to Azure Function App
        uses: azure/functions-action@v1
        continue-on-error: true
        with:
          app-name: 'func-weeklyplanner-dev'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          package: ./func-publish

  # ─────────────────────────────────────────────
  # JOB 4 — runs on push AND on PR open/sync
  # Deploys Angular to Azure Static Web Apps
  # ─────────────────────────────────────────────
  deploy-angular:
    name: Build and Deploy Angular
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd frontend && npm ci
        continue-on-error: true

      - name: Build Angular
        run: cd frontend && npx ng build --configuration production
        continue-on-error: true

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        continue-on-error: true
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/frontend'
          output_location: 'dist/frontend/browser'

  # ─────────────────────────────────────────────
  # JOB 5 — cleans up PR preview environment
  # when a PR is closed/merged
  # ─────────────────────────────────────────────
  close-pr-environment:
    name: Close PR Preview Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
